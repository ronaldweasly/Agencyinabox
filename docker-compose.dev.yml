version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agency-postgres
    environment:
      POSTGRES_DB: agency
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Auto-run schema migrations on first start
      # NOTE: 004_pg_cron.sql is intentionally excluded — pg_cron extension is
      # NOT available in postgres:16-alpine. It's meant for Supabase / managed
      # Postgres only. See the guard in 004_pg_cron.sql for details.
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./sql/002_watchdog.sql:/docker-entrypoint-initdb.d/002_watchdog.sql
      - ./sql/003_gdpr.sql:/docker-entrypoint-initdb.d/003_gdpr.sql
      - ./sql/005_lead_pipeline.sql:/docker-entrypoint-initdb.d/005_lead_pipeline.sql
      - ./sql/006_companies.sql:/docker-entrypoint-initdb.d/006_companies.sql
      - ./sql/007_growth_engine.sql:/docker-entrypoint-initdb.d/007_growth_engine.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agency-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Future worker service should depend on both postgres and redis:
  # worker:
  #   build: .
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  pgdata:
  redisdata:
