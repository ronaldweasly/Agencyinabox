# Agency-in-a-Box — Worker Service (Fly.io)
# Deploy: fly deploy --config fly.worker.toml

app = "agency-worker"
primary_region = "ams"  # Amsterdam — closest to NL target market
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret env vars — secrets are in Doppler
  FLY_APP_NAME = "agency-sandbox"
  DMZ_INTERNAL_URL = "http://agency-dmz.internal:8001"

# Scale to zero when idle — only runs when jobs exist
[http_service]
  # Worker has no HTTP endpoint; Fly keeps it alive via process
  internal_port = 8080
  force_https = false
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "connections"
    hard_limit = 1
    soft_limit = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  worker = "python -m src"
